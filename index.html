<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentosa Premium BG Remover</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --primary: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --border: #27272a;
            --text: #f4f4f5;
            --text-muted: #a1a1aa;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }
        
        body { 
            background-color: var(--bg); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 16px; 
            color: var(--text);
        }

        .wrapper {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 32px 24px;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 6px;
            text-align: center;
            background: var(--primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 28px;
        }

        .upload-box {
            border: 2px dashed #3f3f46;
            background: #202023;
            padding: 40px 16px;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .upload-box:hover {
            border-color: #818cf8;
            background: #242427;
        }

        .upload-box .icon {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
        }

        .upload-box p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .upload-box strong {
            color: #818cf8;
        }

        #hidden-input { display: none; }

        .loading-zone {
            display: none;
            margin: 24px 0;
            text-align: center;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #27272a;
            border-top: 3px solid #818cf8;
            border-radius: 50%;
            margin: 0 auto 12px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        .loading-zone p {
            font-size: 0.85rem;
            color: #818cf8;
            font-weight: 600;
        }

        .result-zone {
            display: none;
            margin-top: 24px;
        }

        .preview-box {
            background-color: #1b1b1f;
            background-image: linear-gradient(45deg, #242427 25%, transparent 25%),
