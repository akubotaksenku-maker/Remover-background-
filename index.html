<!DOCTYPE html>
<html>
<head>
    <title>Background Remover</title>
</head>
<body>
    <input type="file" id="upload">
    <br><br>
    <img id="preview" width="300">
    <br><br>
    <button onclick="removeBg()">Remove Background</button>
    <br><br>
    <a id="download" style="display:none">Download PNG</a>

    <script type="module">
        import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal/+esm';

        window.removeBg = async function() {
            const file = document.getElementById('upload').files[0];
            if (!file) return;

            const blob = await removeBackground(file);

            const url = URL.createObjectURL(blob);

            document.getElementById('preview').src = url;

            const dl = document.getElementById('download');
            dl.href = url;
            dl.download = 'removed-bg.png';
            dl.innerText = 'Download PNG';
            dl.style.display = 'inline';
        }
    </script>
</body>
</html>
